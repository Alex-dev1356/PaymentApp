<form #form="ngForm" (submit)="onSubmit(form)">
    <input type="hidden" name="paymentDetailId" [value]="service
    .formData.paymentDetailId">

    <div class="mb-3">
        <label>Card Owner Name</label>
        <input type="text" class="form-control form-control-lg" 
        placeholder="Name on Card"
        #cardOwnerName="ngModel" name="cardOwnerName"
        [(ngModel)]="service.formData.cardOwnerName"
        required>
    </div>

    <div class="mb-3">
        <label>Card Number</label>
        <input type="text" class="form-control form-control-lg" 
        placeholder="16 Digit Card Number"
        #cardNumber="ngModel" name="cardNumber"
        [(ngModel)]="service.formData.cardNumber"
        required min-length="16" max-length="16">
    </div>

    <div class="row">
        <div class="mb-3 col-6">
            <label>Security Code</label>
            <input type="password" class="form-control form-control-lg"
            placeholder="CVC"
            #securityCode="ngModel" name="securityCode"
            [(ngModel)]="service.formData.securityCode"
            required min-length="3" max-length="3">
        </div>
        <div class="mb-3 col-6">
            <label>Valid Through</label>
            <input type="text" class="form-control form-control-lg"
            placeholder="MM/YY"
            #expirationDate="ngModel" name="expirationDate"
            [(ngModel)]="service.formData.expirationDate"
            required min-length="5" max-length="5">
        </div>
    </div>

    <div class="d-grid">
        <button class="btn btn-lg btn-success" type="submit">
            Submit
        </button>
    </div>
</form>
